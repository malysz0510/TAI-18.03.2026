<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Strona 2</title>
</head>
<body>

<h1 id="welcome-msg"></h1>

<button id="backBtn">Wróć</button>

<script>
    const userName = sessionStorage.getItem('userName');

    if (userName) {
        document.getElementById('welcome-msg').innerText = "Witaj " + userName;
    } else {
        document.getElementById('welcome-msg').innerText = "Nie znamy się!";
    }

    document.getElementById("backBtn").addEventListener("click", function() {
        window.location.href = "index.html";
    });
</script>

</body>
</html>
